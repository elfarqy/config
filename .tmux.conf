# ==============================================================================
# tmux Configuration with Nord Theme (WITH PANE BACKGROUNDS)
# ==============================================================================

# ============================================================================
# Terminal Type
# ============================================================================

# Use tmux-256color for better color support (fallback to screen-256color)
set-option -g default-terminal "tmux-256color"

# Add truecolor support (24-bit color)
set-option -ga terminal-overrides ",xterm-256color:Tc"
set-option -ga terminal-overrides ",tmux-256color:Tc"

# OSC 52 clipboard passthrough (allows Neovim to copy to local clipboard over SSH)
set -g allow-passthrough on

# Send tmux's own copies to the outer terminal's clipboard AND forward OSC 52
# emitted by apps inside panes (e.g. Neovim yanks). Without this (default is
# "external"), tmux swallows OSC 52 into its own buffer instead of the clipboard.
set -g set-clipboard on

# The 'clipboard' feature must be declared for the OUTER client terminal
# (whatever $TERM is *before* tmux starts), not tmux's inner TERM, or tmux
# refuses to forward OSC 52 outward.
set -as terminal-features ',xterm-kitty:clipboard'   # kitty
set -as terminal-features ',alacritty:clipboard'
set -as terminal-features ',xterm-256color:clipboard'
set -as terminal-features ',tmux-256color:clipboard'

# ============================================================================
# TERMINAL COLOR OVERRIDES (Fix black text readability)
# ============================================================================
# Remap terminal colors so "black" text is readable on Nord dark background
# This ensures text colored as "black" by applications appears as light gray

# Remap black (color0) to Nord gray - for readable "black" text
set-option -ga terminal-overrides "*256color:Tc"
set-option -ga terminal-overrides '*256color:setaf0=#4C566A'  # Black -> Nord gray
set-option -ga terminal-overrides '*256color:setab0=#3B4252'  # Black background

# Ensure bright colors are also readable
set-option -ga terminal-overrides '*256color:setaf8=#7B88A1'  # Bright black (lighter gray)
set-option -ga terminal-overrides '*256color:setab8=#434C5E'  # Bright black bg

# ============================================================================
# Basic Settings
# ============================================================================

set-option -g mouse on
set-option -g history-limit 10000
set-option -g base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g display-time 4000
set-option -g status-interval 2

# ============================================================================
# PANE BACKGROUNDS (THIS IS WHAT YOU NEED!)
# ============================================================================

# Set default pane background color (Nord dark background)
# This makes the main terminal area have a background color
set-window-option -g window-style 'bg=#2E3440,fg=#D8DEE9'

# Set active pane style (slightly different background)
set-window-option -g window-active-style 'bg=#2E3440,fg=#ECEFF4'

# Note: If you prefer transparent panes (terminal background shows through),
# comment out the two lines above and uncomment these:
# set-window-option -g window-style 'default'
# set-window-option -g window-active-style 'default'

# ============================================================================
# Status Bar (Nord Theme)
# ============================================================================

set-option -g status on
set-option -g status-position bottom
set-option -g status-justify left
set-option -g status-left-length 80
set-option -g status-right-length 200

# Status bar background and foreground
set-option -g status-style "bg=#2E3440,fg=#D8DEE9"

# ============================================================================
# Window Status Formats
# ============================================================================

# Inactive windows
set-window-option -g window-status-format "#[fg=#4C566A,bg=#2E3440] #I:#W "

# Current window (highlighted with Nord blue)
set-window-option -g window-status-current-format "#[fg=#2E3440,bg=#88C0D0,bold] #I:#W* #[fg=#88C0D0,bg=#2E3440]"

# Window with activity
set-window-option -g window-status-activity-style "fg=#EBCB8B,bg=#2E3440"

# Window with bell
set-window-option -g window-status-bell-style "fg=#BF616A,bg=#2E3440,bold"

# ============================================================================
# Pane Borders
# ============================================================================

# Regular pane border
set-option -g pane-border-style "fg=#3B4252,bg=#2E3440"

# Active pane border (Nord blue)
set-option -g pane-active-border-style "fg=#88C0D0,bg=#2E3440"

# ============================================================================
# Status Bar Content
# ============================================================================

# Left status: Session name
set-option -g status-left '#[fg=#2E3440,bg=#5E81AC,bold] #S #[fg=#5E81AC,bg=#2E3440]'

# Right status: Uses the status-right.sh script which shows all info
set-option -g status-right '#(cd "#{pane_current_path}"; bash ~/.config/tmux-powerline/status-right.sh 2>/dev/null || echo "")'

# ============================================================================
# Message Line (commands, prompts)
# ============================================================================

set-option -g message-style "bg=#88C0D0,fg=#2E3440,bold"
set-option -g message-command-style "bg=#3B4252,fg=#D8DEE9"

# ============================================================================
# Mode (Copy Mode)
# ============================================================================

set-option -g mode-style "bg=#88C0D0,fg=#2E3440,bold"

# ============================================================================
# Copy Mode Settings (vim-style)
# ============================================================================

# Use vi keys
set-window-option -g mode-keys vi

# Easier copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# ============================================================================
# Key Bindings
# ============================================================================

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes with current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigate panes (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Create new window with current path
bind c new-window -c "#{pane_current_path}"

# Toggle pane backgrounds (if you want to switch between solid/transparent)
bind B run-shell 'tmux set-window-option window-style "bg=#2E3440,fg=#D8DEE9" \; set-window-option window-active-style "bg=#2E3440,fg=#ECEFF4"' \; display "Solid background"
bind b run-shell 'tmux set-window-option window-style "default" \; set-window-option window-active-style "default"' \; display "Transparent background"

# ============================================================================
# Nord Color Reference
# ============================================================================
# nord0  #2E3440 - Main background
# nord1  #3B4252 - Secondary background
# nord2  #434C5E - Tertiary background
# nord3  #4C566A - Dimmed text
# nord4  #D8DEE9 - Primary text
# nord5  #E5E9F0 - Bright text
# nord6  #ECEFF4 - Extra bright text
# nord7  #8FBCBB - Cyan accent
# nord8  #88C0D0 - Blue accent (primary)
# nord9  #81A1C1 - Blue
# nord10 #5E81AC - Deep blue
# nord11 #BF616A - Red/error
# nord12 #D08770 - Orange
# nord13 #EBCB8B - Yellow
# nord14 #A3BE8C - Green
# nord15 #B48EAD - Purple
